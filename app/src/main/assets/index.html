<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEO DASH</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.7);
            color: white;
            display: none;
        }
        h1 { font-size: 48px; margin-bottom: 10px; }
        p { font-size: 20px; margin-bottom: 20px; }
        button {
            padding: 15px 40px;
            font-size: 24px;
            background: #00ffcc;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="ui">Progress: 0%</div>
    <div id="overlay">
        <h1 id="status">GAME OVER</h1>
        <p id="score">Progress: 0%</p>
        <button onclick="resetGame()">RETRY</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status');
        const scoreText = document.getElementById('score');

        let width, height, scale;
        let isJumping = false;
        let gameActive = true;
        let progress = 0;
        let particles = [];

        const gravity = 0.8;
        const jumpStrength = -12;
        const gameSpeed = 6;

        let player = {
            x: 100,
            y: 0,
            size: 40,
            vy: 0,
            rotation: 0,
            color: '#00ffcc'
        };

        let obstacles = [];
        let levelLength = 10000; // Total length of level

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            scale = height / 600;
            
            player.y = height - 100 - player.size;
            player.vy = 0;
            player.rotation = 0;
            
            generateLevel();
            requestAnimationFrame(gameLoop);
        }

        function generateLevel() {
            obstacles = [];
            for (let i = 600; i < levelLength; i += 300 + Math.random() * 400) {
                let type = Math.random() > 0.4 ? 'spike' : 'block';
                obstacles.push({
                    x: i,
                    y: height - 100,
                    type: type,
                    width: 40,
                    height: 40
                });
            }
        }

        function resetGame() {
            progress = 0;
            player.x = 100;
            player.y = height - 100 - player.size;
            player.vy = 0;
            player.rotation = 0;
            obstacles.forEach((obs, index) => {
                obs.x = 600 + index * 400; // Simple respawn
            });
            generateLevel();
            gameActive = true;
            overlay.style.display = 'none';
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: color
                });
            }
        }

        function update() {
            if (!gameActive) return;

            // Physics
            player.vy += gravity;
            player.y += player.vy;

            // Ground collision
            const groundY = height - 100;
            if (player.y + player.size > groundY) {
                player.y = groundY - player.size;
                player.vy = 0;
                
                // Rotation snap
                player.rotation = Math.round(player.rotation / 90) * 90;

                if (isJumping) {
                    player.vy = jumpStrength;
                }
            } else {
                player.rotation += 5;
            }

            // Move obstacles and check collision
            obstacles.forEach(obs => {
                obs.x -= gameSpeed;

                // Collision detection
                if (player.x < obs.x + obs.width &&
                    player.x + player.size > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.size > obs.y) {
                    gameOver();
                }
            });

            // Progress
            progress = Math.min(100, Math.floor((Math.abs(obstacles[0].x - 600) / levelLength) * 1000));
            ui.innerText = `Progress: ${progress}%`;

            if (progress >= 100) win();

            // Particles
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            });
        }

        function draw() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, width, height);

            // Draw Ground
            ctx.fillStyle = '#333';
            ctx.fillRect(0, height - 100, width, 100);
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, height - 100);
            ctx.lineTo(width, height - 100);
            ctx.stroke();

            // Draw Obstacles
            obstacles.forEach(obs => {
                ctx.fillStyle = obs.type === 'spike' ? '#ff4444' : '#ffcc00';
                if (obs.type === 'spike') {
                    ctx.beginPath();
                    ctx.moveTo(obs.x, obs.y + obs.height);
                    ctx.lineTo(obs.x + obs.width / 2, obs.y);
                    ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
                    ctx.fill();
                } else {
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                    ctx.strokeStyle = 'white';
                    ctx.strokeRect(obs.x, obs.y, obs.width, obs.height);
                }
            });

            // Draw Player
            ctx.save();
            ctx.translate(player.x + player.size / 2, player.y + player.size / 2);
            ctx.rotate(player.rotation * Math.PI / 180);
            ctx.fillStyle = player.color;
            ctx.fillRect(-player.size / 2, -player.size / 2, player.size, player.size);
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.strokeRect(-player.size / 2, -player.size / 2, player.size, player.size);
            ctx.restore();

            // Draw Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 4, 4);
            });
            ctx.globalAlpha = 1;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameActive = false;
            createParticles(player.x, player.y, '#ff4444');
            statusText.innerText = "CRASHED!";
            scoreText.innerText = `Progress: ${progress}%`;
            overlay.style.display = 'flex';
        }

        function win() {
            gameActive = false;
            statusText.innerText = "LEVEL COMPLETE!";
            scoreText.innerText = "You mastered Geo Dash!";
            overlay.style.display = 'flex';
        }

        // Controls
        const handleStart = () => { isJumping = true; };
        const handleEnd = () => { isJumping = false; };

        window.addEventListener('mousedown', handleStart);
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(); }, {passive: false});
        window.addEventListener('touchend', handleEnd);
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') handleStart(); });
        window.addEventListener('keyup', (e) => { if (e.code === 'Space') handleEnd(); });

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });

        init();
    </script>
</body>
</html>
